    env_file:
      - ./configs/studio/inbox.env
    depends_on:
      elasticsearch:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      egov-mdms-service:
        condition: service_healthy
      egov-user:
        condition: service_healthy
      egov-workflow-v2:
        condition: service_healthy
