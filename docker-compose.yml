      DEFAULT_OFFSET: "0"
      JAVA_TOOL_OPTIONS: -Xms256m -Xmx512m
      OTEL_TRACES_EXPORTER: none
    ports:
      - "18114:8080"
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 8080 >/dev/null 2>&1 || exit 1"]
