    depends_on:
      pgbouncer:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      egov-mdms-service:
        condition: service_healthy
      egov-localization:
        condition: service_healthy
      egov-filestore:
        condition: service_healthy
      egov-user:
        condition: service_healthy
