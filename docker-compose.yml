    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/inbox/actuator/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 300s
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "0.5"
