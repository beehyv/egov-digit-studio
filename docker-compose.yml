# Laptop-local DIGIT core stack (Docker Compose + optional Tilt).
# Aligns with egovernments/DIGIT-DevOps (e.g. unified-demo / studio Helm charts) for env wiring.
#
# Studio / sandbox images: override in shell or `.env` (client-supplied tags). Defaults match
# Studio-services-builds.pdf naming; replace tags without changing env blocks.
#   IMAGE_MDMS_V2, IMAGE_EGOV_USER, IMAGE_EGOV_WORKFLOW_V2, IMAGE_EGOV_HRMS,
#   IMAGE_DIGIT_STUDIO, IMAGE_PUBLIC_SERVICE_INIT, IMAGE_PUBLIC_SERVICE, IMAGE_INBOX,
#   IMAGE_HEALTH_INDIVIDUAL, IMAGE_HEALTH_SERVICE_REQUEST, IMAGE_STUDIO_PDF,
#   IMAGE_EGOV_OTP, IMAGE_PDF_SERVICE, IMAGE_USER_OTP, IMAGE_EGOV_NOTIFICATION_SMS
services:
  # PostgreSQL: init scripts in docker-entrypoint-initdb.d (e.g. full-dump.sql) run before DB accepts normal traffic.
  postgres-db:
    image: postgres:16
    container_name: docker-postgres
    environment:
      POSTGRES_USER: egov
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-egov123}
      POSTGRES_DB: egov
    volumes:
      - postgres_data:/var/lib/docker-postgresql/data
      - ./db/full-dump.sql:/docker-entrypoint-initdb.d/01-full-dump.sql:ro
    ports:
      - 15432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U egov"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '0.5'
    networks:
      - egov-network

  # Flyway batch (docker/db-migrations); runs once after Postgres is healthy, then exits.
  db-migrations:
    build:
      context: ./docker/db-migrations
      dockerfile: Dockerfile
    image: egov-digit-studio-db-migrations:local
    pull_policy: never
    container_name: digit-db-migrations
    depends_on:
      postgres-db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres-db:5432/egov
      FLYWAY_USER: egov
      FLYWAY_PASSWORD: ${POSTGRES_PASSWORD:-egov123}
    networks:
      - egov-network
    restart: "no"

  # PgBouncer - connection pooler
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: digit-pgbouncer
    environment:
      DB_HOST: postgres-db
      DB_PORT: 5432
      DB_USER: egov
      DB_PASSWORD: ${POSTGRES_PASSWORD:-egov123}
      DB_NAME: egov
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 500
      DEFAULT_POOL_SIZE: 20
      MIN_POOL_SIZE: 5
      RESERVE_POOL_SIZE: 5
      AUTH_TYPE: scram-sha-256
      # Client TLS: public-service* Go code uses sslmode=require for DB ping, so the pooler
      # must answer SSL negotiation. CLIENT_TLS_SSLMODE=allow still accepts plain clients.
      # Spring services use jdbc:...postgres...?sslmode=disable so drivers do not try TLS
      # against this dev self-signed cert unless we add truststore config later.
      CLIENT_TLS_SSLMODE: allow
      CLIENT_TLS_CERT_FILE: /etc/pgbouncer/tls/server.crt
      CLIENT_TLS_KEY_FILE: /etc/pgbouncer/tls/server.key
    volumes:
      # Bind-mounted dev cert: key must be readable by the pgbouncer process (user postgres); 600 + host-only owner breaks load.
      - ./docker/pgbouncer-tls:/etc/pgbouncer/tls:ro
    depends_on:
      postgres-db:
        condition: service_healthy
      db-migrations:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-p", "5432", "-U", "egov"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    networks:
      egov-network:
        aliases:
          - postgres

  redis:
    image: redis:7.2.4
    container_name: digit-redis
    ports:
      - 16379:6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    networks:
      - egov-network

  redpanda:
    image: redpandadata/redpanda:v24.1.1
    container_name: digit-redpanda
    command:
      - redpanda
      - start
      - --smp
      - '1'
      - --memory
      - 256M
      - --overprovisioned
      - --node-id
      - '0'
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092
      - --pandaproxy-addr
      - PLAINTEXT://0.0.0.0:8082
      - --advertise-pandaproxy-addr
      - PLAINTEXT://redpanda:8082
    ports:
      - 19092:9092
      - 18082:8082
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 300M
          cpus: '0.5'
    networks:
      egov-network:
        aliases:
          - kafka
          - kafka-v2.kafka-cluster

  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    container_name: digit-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - 19000:9000
      - 19001:9001
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    networks:
      - egov-network

  minio-init:
    image: minio/mc:RELEASE.2024-01-16T16-06-34Z
    container_name: digit-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing myminio/egov-rainmaker;
      mc anonymous set download myminio/egov-rainmaker;
      exit 0;
      "
    networks:
      - egov-network

  user-seed:
    image: curlimages/curl:latest
    container_name: digit-user-seed
    depends_on:
      egov-user:
        condition: service_started   # Don't wait for Docker healthcheck
    environment:
      EGOV_USER_HOST: http://egov-user:8107
    volumes:
      - ./seeds/user-seed.sh:/seed.sh:ro
    entrypoint: >
      /bin/sh -c "
      echo 'Waiting 120 seconds for egov-user to fully start...';
      sleep 120;
      echo '=== Running user seed ===';
      /bin/sh /seed.sh;
      exit 0;
      "
    networks:
      - egov-network
    restart: "no"

  # MDMS Backend
  mdms-backend:
    image: ${IMAGE_MDMS_V2:-egovio/mdms-v2:master-1e8d2bb}
    container_name: mdms-backend
    depends_on:
      pgbouncer:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:otel:postgresql://postgres:5432/egov?sslmode=disable
      SPRING_DATASOURCE_USERNAME: egov
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-egov123}
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "5"
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: "2"
      SPRING_FLYWAY_ENABLED: 'false'
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      SPRING_KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      SERVER_PORT: 8094
      OTEL_TRACES_EXPORTER: none
      JAVA_TOOL_OPTIONS: -Xms64m -Xmx192m
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8094/mdms-v2/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 45s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1'
    networks:
      - egov-network

  egov-mdms-service:
    image: nginx:alpine
    container_name: egov-mdms-service
    depends_on:
      mdms-backend:
        condition: service_healthy
    volumes:
      - ./nginx/mdms-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - 18094:8094
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -X POST 'http://localhost:8094/mdms-v2/v1/_search' -H 'Content-Type: application/json' -d '{\"RequestInfo\":{\"apiId\":\"health\"},\"MdmsCriteria\":{\"tenantId\":\"pg\",\"moduleDetails\":[{\"moduleName\":\"tenant\",\"masterDetails\":[{\"name\":\"tenants\"}]}]}}'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.1'
    networks:
      - egov-network

  egov-enc-service:
    image: egovio/egov-enc-service:v2.9.2-4a60f20
    container_name: egov-enc-service
    depends_on:
      pgbouncer:
        condition: service_healthy
      egov-mdms-service:
        condition: service_healthy
    environment:
