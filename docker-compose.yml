    networks:
      - egov-network


  digit-ui:
    image: egovio/digit-ui:multiarch-d448cb7
    container_name: digit-ui
    ports:
      - "18080:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/digit-ui/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'
    networks:
      - egov-network

  kong:
    image: kong:3.6
    container_name: kong-gateway
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_ADMIN_GUI_URL: http://localhost:8002
      KONG_STATUS_LISTEN: 0.0.0.0:8100
      KONG_MEM_CACHE_SIZE: 64m
      KONG_NGINX_WORKER_PROCESSES: 1
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    volumes:
      - ./kong/kong.yml:/kong/kong.yml:ro
    ports:
      - "18000:8000"
      - "18443:8443"
      - "18001:8001"
      - "18002:8002"
      - "18100:8100"
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      egov-mdms-service:
        condition: service_healthy
      egov-user:
        condition: service_healthy
    networks:
      - egov-network

  gatus:
    image: twinproduction/gatus:latest
    container_name: digit-gatus
    depends_on:
      pgbouncer:
        condition: service_healthy
      egov-mdms-service:
        condition: service_healthy
    volumes:
      - ./gatus/config.yaml:/config/config.yaml:ro
    ports:
      - "18889:8080"
    environment:
      GATUS_CONFIG_PATH: /config/config.yaml
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.1'
    networks:
      - egov-network

  jupyter:
    build:
      context: ./jupyter
      dockerfile: Dockerfile
    container_name: digit-jupyter
    user: root
    depends_on:
      egov-mdms-service:
        condition: service_healthy
      egov-user:
        condition: service_healthy
      kong:
        condition: service_healthy
    environment:
      DIGIT_URL: http://kong:8000
      DIGIT_DIRECT_MDMS: http://egov-mdms-service:8094
      DIGIT_DIRECT_USER: http://egov-user:8107
      DIGIT_TENANT: pg
      JUPYTER_ENABLE_LAB: "yes"
    command: >
      jupyter lab
      --ip=0.0.0.0
      --port=8888
      --no-browser
      --allow-root
      --ServerApp.token=''
      --ServerApp.password=''
      --ServerApp.base_url=/jupyter
      --ServerApp.allow_origin='*'
    ports:
      - "18888:8888"
    volumes:
      - ./jupyter/dataloader/templates:/home/jovyan/work/templates
      - ./jupyter:/home/jovyan/work/dataloader
      - ./jupyter/DataLoader_v2.ipynb:/home/jovyan/work/DataLoader_v2.ipynb
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    networks:
      - egov-network

networks:
  egov-network:
    driver: bridge

volumes:
  postgres_data: null
  minio_data: null
