server
{
  listen 80;
  underscores_in_headers on;

  # Behind Kong the Host header is often "digit-studio". Without these, a request
  # to /digit-studio (no trailing slash) becomes a 301 to http://digit-studio/...
  # which does not resolve in the browser. Relative redirects keep the client on
  # whatever host:port they used (e.g. localhost:18000).
  absolute_redirect off;
  port_in_redirect off;

  # Enable sub_filter for HTML injection
  sub_filter_once on;
  sub_filter_types text/html;

  # Explicit slash redirect (relative Location when absolute_redirect is off)
  location = /digit-studio {
    return 301 /digit-studio/;
  }

  location /digit-studio
  {
    root /var/web;
    index index.html index.htm;
    try_files $uri $uri/ /digit-studio/index.html;

    # Inject globalConfigs.js script tag before </head>
    sub_filter '</head>' '<script src="/digit-studio/globalConfigs.js"></script></head>';
  }

  # Serve globalConfigs.js
  location = /digit-studio/globalConfigs.js {
    alias /var/web/digit-studio/globalConfigs.js;
    default_type application/javascript;
  }
}
