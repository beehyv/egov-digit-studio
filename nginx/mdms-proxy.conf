server {
    listen 8094;

    # Rewrite old MDMS v1 paths to mdms-v2 paths
    location /egov-mdms-service/ {
        proxy_pass http://mdms-backend:8094/mdms-v2/;
        proxy_set_header Host mdms-backend:8094;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Pass through mdms-v2 paths directly
    location /mdms-v2/ {
        proxy_pass http://mdms-backend:8094;
        proxy_set_header Host mdms-backend:8094;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Health check
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
